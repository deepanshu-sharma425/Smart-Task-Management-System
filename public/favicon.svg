<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="256" height="256" rx="64" fill="url(#gradient)"/>
  
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="256" y2="256">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Grid/Layout icon representing TaskForge -->
  <g transform="translate(64, 64)">
    <!-- Top left square -->
    <rect x="0" y="0" width="50" height="50" rx="8" fill="white" opacity="0.9"/>
    <rect x="0" y="0" width="50" height="50" rx="8" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
    
    <!-- Top right square -->
    <rect x="62" y="0" width="50" height="50" rx="8" fill="white" opacity="0.7"/>
    <circle cx="87" cy="25" r="8" fill="#3b82f6"/>
    
    <!-- Bottom left square -->
    <rect x="0" y="62" width="50" height="50" rx="8" fill="white" opacity="0.7"/>
    <line x1="12" y1="74" x2="38" y2="74" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="87" x2="38" y2="87" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="100" x2="32" y2="100" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Bottom right square (checkmark) -->
    <rect x="62" y="62" width="50" height="50" rx="8" fill="white" opacity="0.9"/>
    <path d="M 75 87 L 82 94 L 102 74" stroke="#3b82f6" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
